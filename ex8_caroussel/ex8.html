<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Carousel Bootstrap</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body>
    <!-- 1ª Digitação (Aqui) -->
    <div class="container mt-3">
        <div id="carouselExemplo" class="carousel slide" data-bs-ride="carousel">
            <div class="carousel-inner">

                <div class="carousel-item active">
                    <img src="/ex8_caroussel/image1.jpg" class="d-block w-100" alt="slide 1">
                </div>

                <div class="carousel-item">
                    <img src="/ex8_caroussel/image2.avif" class="d-block w-100" alt="slide 2">
                </div>

                <div class="carousel-item">
                    <img src="/ex8_caroussel/image3.jpg" class="d-block w-100" alt="slide 3">
                </div>

                <button class="carousel-control-prev" type="button" data-bs-target="#carouselExemplo"
                    data-bs-slide="prev">
                    <span class="carousel-control-prev-icon"></span>
                </button>

                <button class="carousel-control-next" type="button" data-bs-target="#carouselExemplo"
                    data-bs-slide="next">
                    <span class="carousel-control-next-icon"></span>
                </button>
            </div>
        </div>


        <hr class="mt-3">

        <div class="container mt-3">
            <div id="carouselExemplo2" class="carousel slide" data-bs-ride="carousel">
                <div class="carousel-inner">

                    <div class="carousel-item active">
                        <img src="/ex8_caroussel/image4.jpg" class="d-block w-100" alt="slide 1">
                    </div>

                    <div class="carousel-item">
                        <img src="/ex8_caroussel/image5.jpg" class="d-block w-100" alt="slide 2">
                    </div>

                    <div class="carousel-item">
                        <img src="/ex8_caroussel/image6.jpg" class="d-block w-100" alt="slide 3">
                    </div>

                    <button class="carousel-control-prev" type="button" data-bs-target="#carouselExemplo2"
                        data-bs-slide="prev">
                        <span class="carousel-control-prev-icon"></span>
                    </button>

                    <button class="carousel-control-next" type="button" data-bs-target="#carouselExemplo2"
                        data-bs-slide="next">
                        <span class="carousel-control-next-icon"></span>
                    </button>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
