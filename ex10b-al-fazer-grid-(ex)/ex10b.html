<!DOCTYPE html>
<html lang="pt">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Promoções da Loja</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        /* Centralizar o carrossel */
        .carousel-container {
            display: flex;
            justify-content: center;
            align-items: center;
            margin-top: 20px;
        }

        .carousel-inner img {
            margin: auto;
        }
    </style>
</head>

<body>



    <!-- 1ª Digitação (Aqui) -->
    <!-- =============================== MENU =============================== -->
    <nav class="navbar navbar-expand-lg bg-body-tertiary" data-bs-theme="dark">
        <div class="container">
            <a class="navbar-brand" href="#">SENAI</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse"
                data-bs-target="#navbarSupportedContent" aria-controls="navbarSupportedContent" aria-expanded="false"
                aria-label="Toggle navigation">
                <span class="navbar-toggler-icon"></span>
            </button>

            <!-- =============================== MENU - COLLAPSE =============================== -->
            <div class="collapse navbar-collapse" id="navbarSupportedContent">
                <ul class="navbar-nav mb-2 mb-lg-0">
                    <li class="nav-item">
                        <a class="nav-link active" aria-current="page" href="#">Home</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="#">Link</a>
                    </li>
                </ul>

                <!-- =============================== Botão Modal =============================== -->
                <button class="btn btn-outline-success" type="submit" data-bs-toggle="modal"
                    data-bs-target="#exemploModal">Contato</button>

                <!-- =============================== Modal =============================== -->
                <div class="modal fade" id="exemploModal" data-bs-theme="light">
                    <div class="modal-dialog">
                        <div class="modal-content">

                            <!-- Header -->
                            <div class="modal-header">
                                <h5 class="modal-title">Título do Modal</h5>
                                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                            </div>

                            <!-- Corpo -->
                            <form class="needs-validation" novalidate>
                                <div class="modal-body">

                                    <!-- NOME -->
                                    <div class="mb-3">
                                        <label for="validationNome" class="form-label">Nome</label>
                                        <input class="form-control" type="text" placeholder="Nome" id="validationNome"
                                            required>
                                        <div class="invalid-feedback">
                                            Por favor, insira um nome!
                                        </div>
                                    </div>

                                    <!-- EMAIL -->
                                    <div class="mb-3">
                                        <label for="validationEmail" class="form-label">E-mail</label>
                                        <input type="email" class="form-control" id="validationEmail"
                                            placeholder="exemplo@email.com" required>
                                        <div class="invalid-feedback">
                                            Por favor, insira um e-mail válido!
                                        </div>
                                    </div>

                                    <!-- MENSAGEM -->
                                    <div class="mb-3">
                                        <label for="validationMensagem" class="form-label">Mensagem</label>
                                        <textarea class="form-control" id="validationMensagem" rows="3"
                                            required></textarea>
                                        <div class="invalid-feedback">
                                            Por favor, insira uma mensagem!
                                        </div>
                                    </div>
                                </div>

                                <!-- Rodapé -->
                                <div class="modal-footer">
                                    <button type="button" class="btn btn-secondary"
                                        data-bs-dismiss="modal">Fechar</button>
                                    <button type="submit" class="btn btn-primary">Salvar</button>
                                </div>
                            </form>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </nav>


    <!-- Alert de Erro -->
    <div class="alert alert-success text-center" id="errorAlert">
        Um<strong> desconto!</strong> está disponível neste exato momento!
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>

    <div class="container mt-3">
        <div id="carouselExemplo" class="carousel slide" data-bs-ride="carousel">
            <div class="carousel-inner">

                <div class="carousel-item active">
                    <img src="images/image1.webp" class="d-block w-100" alt="slide 1">
                </div>

                <div class="carousel-item">
                    <img src="images/image2.png" class="d-block w-100" alt="slide 2">
                </div>

                <div class="carousel-item">
                    <img src="images/image3.webp" class="d-block w-100" alt="slide 3">
                </div>

                <button class="carousel-control-prev" type="button" data-bs-target="#carouselExemplo"
                    data-bs-slide="prev">
                    <span class="carousel-control-prev-icon"></span>
                </button>

                <button class="carousel-control-next" type="button" data-bs-target="#carouselExemplo"
                    data-bs-slide="next">
                    <span class="carousel-control-next-icon"></span>
                </button>
            </div>
        </div>

        <!-- Progressbar com controles -->
        <h5 class="mt-4 text-center">Progresso:</h5>
        <div class="progress mb-3">
            <div class="progress-bar progress-bar-striped progress-bar-animated" id="progress-bar" role="progressBar"
                style="width: 0%;">
                0%
            </div>
        </div>

        <!-- Controles do progress bar -->
        <div class="btn-group d-flex justify-content-center">
            <button class="btn btn-primary" id="increase-progress">Ganhe um desconto!</button>
        </div>
        <br><br><br><br><br><br><br><br><br><br>

        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
        <script>
            (function () {
                'use strict'
                var forms = document.querySelectorAll('.needs-validation')
                Array.prototype.slice.call(forms).forEach(function (form) {
                    form.addEventListener('submit', function (event) {
                        if (!form.checkValidity()) {
                            event.preventDefault()
                            event.stopPropagation()
                        }
                        form.classList.add('was-validated')
                    }, false)
                })
            })()

            document.getElementById('increase-progress').addEventListener('click', function () {
                let progressBar = document.getElementById('progress-bar');
                let width = parseInt(progressBar.style.width);

                if (width < 100) {
                    width += 20;
                    progressBar.style.width = width + "%";
                    progressBar.textContent = width + "%";

                    if (width === 100) {
                        alert("🎉 Parabéns! Você desbloqueou um desconto especial!");
                    }
                }
            });
        </script>

</body>

</html>
