<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Grid Bootstrap</title>
    <!-- CSS do bootstrap via CDN -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- CSS personalizado -->
    <link rel="stylesheet" href="style.css">
</head>

<body>


    <!-- 1ª Digitação (Aqui) -->
    <!-- Linha com 2 colunas -->
    <div class="container ms-">
        <div class="row">
            <div class="col-sm-6 bg-warning">Coluna 1</div>
            <div class="col-sm-6 bg-primary">Coluna 2</div>
        </div>
        <!-- Linha com 3 colunas -->
        <div class="row my-3">
            <div class="col-sm-4 bg-info">Coluna 1</div>
            <div class="col-sm-4 bg-danger">Coluna 2</div>
            <div class="col-sm-4 bg-dark">Coluna 2</div>
        </div>

        <!-- Linha com 4 colunas -->
        <div class="row my-3">
            <div class="col-sm-3 bg-success">Coluna 1</div>
            <div class="col-sm-3 bg-info">Coluna 1</div>
            <div class="col-sm-3 bg-danger">Coluna 2</div>
            <div class="col-sm-3 bg-dark">Coluna 2</div>
        </div>
        <!-- Linha com colunas diferentes -->
        <div class="row mb-3">

            <!-- Primeira coluna da linha -->
            <div class="bg-custom col-md-7 mb-4 text-end text-uppercase fw-bold fst-italic">
                <h2>Meu título</h2>
                <p>Texto responsivo</p>
            </div>

            <!-- Segunda coluna da linha -->
            <div class="col-md-5 bg-success text-center">
                <img src="https://placehold.co/200x100" alt="imagem">
            </div>

        </div>
    </div>


    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
