<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Grid Bootstrap</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>


    <!-- 1ª Digitação (Aqui) -->
     <div class="container">
        <div class="row">
            <div class="col-sm-6 bg-warning">Coluna 1</div>
            <div class="col-sm-6 bg-primary">Coluna 2</div>
        </div>
     </div>

     <div class="container">
        <div class="row my-3">
            <div class="col-sm-4 bg-info">Coluna 1</div>
            <div class="col-sm-4 bg-danger">Coluna 2</div>
            <div class="col-sm-4 bg-dark">Coluna 2</div>
        </div>
     </div>
     
     <div class="container">
        <div class="row my-3">
            <div class="col-sm-3 bg-success">Coluna 1</div>
            <div class="col-sm-3 bg-info">Coluna 1</div>
            <div class="col-sm-3 bg-danger">Coluna 2</div>
            <div class="col-sm-3 bg-dark">Coluna 2</div>
        </div>
     </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
